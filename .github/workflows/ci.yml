name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Compile sources
        run: python -m compileall -q arc

      - name: Run tests
        id: pytest
        run: |
          mkdir -p .ci
          python -m pytest -q --junitxml=.ci/pytest.xml

      - name: Write job summary
        if: always()
        env:
          PYTEST_OUTCOME: ${{ steps.pytest.outcome }}
        run: |
          python - <<'EOF'
          import os
          import platform
          import xml.etree.ElementTree as ET

          lines = ["## CI test summary", ""]
          lines.append(f"- Python version: {platform.python_version()}")
          lines.append(f"- pytest outcome: {os.environ.get('PYTEST_OUTCOME', 'unknown')}")
          try:
              suite = ET.parse(".ci/pytest.xml").getroot().find("testsuite")
              lines.append(f"- total tests: {suite.get('tests')}")
              lines.append(f"- failures: {suite.get('failures')}")
              lines.append(f"- errors: {suite.get('errors')}")
              lines.append(f"- skipped: {suite.get('skipped')}")
          except (OSError, ET.ParseError, AttributeError) as error:
              lines.append(f"- JUnit XML unavailable: {error}")
          lines.append("- JUnit artifact: pytest-results")
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
              summary.write("\n".join(lines) + "\n")
          EOF

      - name: Upload pytest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: .ci/pytest.xml
          if-no-files-found: error
          retention-days: 14
